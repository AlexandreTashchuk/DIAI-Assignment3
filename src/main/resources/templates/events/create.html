<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Event</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>

<body>

<div th:replace="fragments/layout :: navbar"></div>

<div class="container mt-4">

    <h2>Create Event</h2>

    <form th:action="@{/clubs/{id}/events(id=${clubId})}"
          th:object="${eventForm}"
          method="post">

        <!-- NAME -->
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" th:field="*{name}" class="form-control">

            <div class="text-danger"
                 th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}">
            </div>
        </div>

        <!-- DATE -->
        <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" th:field="*{date}" class="form-control">

            <div class="text-danger"
                 th:if="${#fields.hasErrors('date')}"
                 th:errors="*{date}">
            </div>
        </div>

        <!-- TYPE -->
        <div class="mb-3">
            <label class="form-label">Type</label>

            <select th:field="*{type}" class="form-select">
                <option value="">Select type</option>

                <option th:each="t : ${types}"
                        th:value="${t}"
                        th:text="${t}">
                </option>
            </select>

            <div class="text-danger"
                 th:if="${#fields.hasErrors('type')}"
                 th:errors="*{type}">
            </div>
        </div>

        <!-- LOCATION -->
        <div class="mb-3">
            <label class="form-label">Location</label>

            <div class="input-group">
                <input id="locationInput" type="text" th:field="*{location}" class="form-control">
                <button type="button" id="checkWeatherJs" class="btn btn-outline-primary">Check Weather JS</button>
                <button type="button"
                        class="btn btn-outline-secondary"
                        hx-get="/api/weather"
                        hx-target="#weatherResult"
                        hx-swap="innerHTML"
                        hx-include="#locationInput"
                        hx-headers='{"Accept":"text/html"}'>
                    Check Weather HTMX
                </button>
            </div>

            <div class="text-danger"
                 th:if="${#fields.hasErrors('location')}"
                 th:errors="*{location}">
            </div>

            <div id="weatherResult" class="mt-2 text-secondary">Weather status not checked yet.</div>
        </div>

        <!-- DESCRIPTION -->
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea th:field="*{description}" class="form-control"></textarea>
        </div>

        <button class="btn btn-primary">Create</button>

    </form>

</div>

<script>
    (function () {
        const button = document.getElementById("checkWeatherJs");
        const locationInput = document.getElementById("locationInput");
        const result = document.getElementById("weatherResult");

        function renderWeather(raining) {
            if (raining === true) {
                result.innerHTML = '<span class="badge bg-warning text-dark">Raining</span>';
                return;
            }
            if (raining === false) {
                result.innerHTML = '<span class="badge bg-success">Clear</span>';
                return;
            }
            result.innerHTML = '<span class="text-secondary">Weather data unavailable.</span>';
        }

        button.addEventListener("click", function () {
            const location = (locationInput.value || "").trim();
            if (!location) {
                renderWeather(null);
                return;
            }

            fetch(`/api/weather?location=${encodeURIComponent(location)}`, {
                method: "GET",
                credentials: "same-origin",
                headers: {
                    "Accept": "application/json"
                }
            })
                .then(function (response) {
                    if (!response.ok) {
                        throw new Error("Request failed");
                    }
                    return response.json();
                })
                .then(function (body) {
                    renderWeather(body.raining);
                })
                .catch(function () {
                    renderWeather(null);
                });
        });
    })();
</script>

</body>
</html>
